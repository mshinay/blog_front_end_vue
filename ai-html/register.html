    <body>
<div id="register-modal" class="modal" >
  <div class="modal-content">
    <span class="close-modal">×</span>
    <h3>注册</h3>
    <form id="register-form">
      <input type="text" id="register-username" placeholder="用户名" required />
     <input type="email"  id="email" name="email" placeholder="邮箱" required>
      <input type="password" id="register-password" placeholder="密码" required />
       <input type="password" id="confirm-password" name="confirm-password" placeholder="确认密码" required>
      <button type="submit">注册</button>
    </form>
  </div>
</div>
    </body>
</html>
