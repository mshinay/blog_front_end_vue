<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>编辑文章</title>
  <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet" />
  <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f6f8;
      margin: 0;
      padding: 0;
    }

    #header-container {
      width: 100%;
      position: fixed;
      top: 0;
      left: 0;
      z-index: 1000;
    }

    .content-wrapper {
      margin-top: 80px; /* 避开导航栏 */
      display: flex;
      justify-content: center;
    }

    form {
      width: 600px;
      background-color: #fff;
      padding: 30px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      border-radius: 10px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: bold;
    }

    input[type="text"] {
      width: 100%;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 5px;
      font-size: 14px;
    }

    #editor {
      height: 300px;
      border: 1px solid #ccc;
      border-radius: 5px;
      background-color: white;
    }

    button {
      background-color: #007bff;
      color: white;
      border: none;
      padding: 10px 20px;
      font-size: 16px;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background-color: #0056b3;
    }
  </style>
</head>
<body>
  <!-- 顶部导航栏 -->
  <div id="header-container"></div>
  <script src="../js/util/include-header.js"></script>

  <!-- 内容区域 -->
  <div class="content-wrapper">
    <form id="article-form">
      <div class="form-group">
        <label for="title">标题</label>
        <input type="text" id="title" name="title" placeholder="请输入文章标题" required />
      </div>

      <div class="form-group">
        <label for="content">内容</label>
        <div id="editor"></div>
      </div>

      <div>
        <button type="submit">更新文章</button>
      </div>
    </form>
  </div>

  <script type="module" src="../js/article/edit-article.js"></script>
</body>
</html>
